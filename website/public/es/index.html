<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>toT — de Texto a Tiempo</title>
  <meta name="description"
    content="toT es una app de escritorio para convertir texto en tiempo de lectura, con análisis, conteo y herramientas OCR.">
  <link rel="canonical" href="https://totapp.org/es/">
  <link rel="alternate" hreflang="es" href="https://totapp.org/es/">
  <link rel="alternate" hreflang="en" href="https://totapp.org/en/">
  <link rel="alternate" hreflang="x-default" href="https://totapp.org/">
  <meta property="og:url" content="https://totapp.org/es/">
  <meta property="og:title" content="toT — de Texto a Tiempo">
  <meta property="og:description"
    content="toT es una app de escritorio para convertir texto en tiempo de lectura, con análisis, conteo y herramientas OCR.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://totapp.org/og-image.png">
  <meta property="og:image:alt"
    content="Captura de la app toT mostrando su interfaz de estimación de tiempo de lectura">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <main class="wrap">
    <nav class="lang-switch" aria-label="Selector de idioma">
      <a href="/es/" lang="es" aria-current="page">ES</a>
      <a href="/en/" lang="en">EN</a>
      <a href="/">/</a>
    </nav>

    <h1>toT</h1>
    <p><strong>de Texto a Tiempo</strong></p>

    <div class="box">
      <p>
        toT es una app de escritorio para convertir texto en tiempo de lectura, con análisis, conteo y herramientas OCR.
      </p>
      <div class="download-panel">
        <p id="os-message">Detectando sistema operativo...</p>
        <p>
          <a id="primary-download" class="cta-button" href="https://github.com/Cibersino/tot/releases/latest">
            Ver últimas versiones en GitHub
          </a>
        </p>
        <p class="manual-fallback">
          <a href="https://github.com/Cibersino/tot/releases/latest">Ver todas las versiones</a>
        </p>
      </div>
      <p class="muted">
        Esta página web está en construcción.
      </p>
    </div>
  </main>

  <script>
    (function () {
      var windowsStableUrl = "https://github.com/Cibersino/tot/releases/download/v0.1.6/toT-0.1.6-win-x64.zip";
      var releasesUrl = "https://github.com/Cibersino/tot/releases/latest";
      var messageEl = document.getElementById("os-message");
      var ctaEl = document.getElementById("primary-download");

      function detectOs() {
        var ua = (navigator.userAgent || "").toLowerCase();
        var platform = (navigator.platform || "").toLowerCase();
        var source = platform + " " + ua;

        if (source.indexOf("win") !== -1) return "windows";
        if (source.indexOf("mac") !== -1 && source.indexOf("iphone") === -1 && source.indexOf("ipad") === -1 && source.indexOf("ipod") === -1) return "macos";
        if (source.indexOf("linux") !== -1 || source.indexOf("x11") !== -1) return "linux";
        return "unknown";
      }

      var os = detectOs();

      if (ctaEl) {
        if (os === "windows") {
          ctaEl.href = windowsStableUrl;
          ctaEl.textContent = "Descargar para Windows (estable)";
        } else {
          ctaEl.href = releasesUrl;
          ctaEl.textContent = "Ver últimas versiones en GitHub";
        }
      }

      if (messageEl) {
        if (os === "windows") {
          messageEl.textContent = "Detectamos Windows. Descarga directa de la versión estable más reciente para Windows.";
        } else if (os === "macos") {
          messageEl.textContent = "Detectamos macOS. Aún no hay descarga directa estable para macOS. Revisa las últimas versiones en GitHub.";
        } else if (os === "linux") {
          messageEl.textContent = "Detectamos Linux. Aún no hay descarga directa estable para Linux. Revisa las últimas versiones en GitHub.";
        } else {
          messageEl.textContent = "No pudimos detectar tu sistema operativo. Revisa las últimas versiones en GitHub.";
        }
      }

      try {
        localStorage.setItem("tot-preferred-lang", "es");
      } catch (_) {
        // Ignore storage restrictions.
      }
    })();
  </script>
</body>

</html>
