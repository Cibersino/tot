<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>toT — de Texto a Tiempo</title>
  <meta
    name="description"
    content="toT es una app de escritorio para convertir texto en tiempo de lectura, con análisis, conteo y herramientas OCR.">
  <link rel="canonical" href="https://totapp.org/">
  <meta property="og:url" content="https://totapp.org/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 2.2rem;
      line-height: 1.15;
    }

    p {
      font-size: 1.05rem;
    }

    .box {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #8884;
      border-radius: 12px;
    }

    .muted {
      opacity: 0.8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>toT</h1>
    <p><strong>de Texto a Tiempo</strong></p>

    <div class="box">
      <p>
        toT es una app de escritorio para convertir texto en tiempo de lectura, con análisis, conteo y herramientas OCR.
      </p>
      <p class="muted">
        Esta página web está en construcción.
      </p>
    </div>
  </main>
</body>
</html>
