<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="title">
  <title id="title">Task comment and linked text snapshot</title>
  <defs>
    <style>
      .task-comment {
        --icon-color: var(--tot-icon-task-comment, #5f6f82);
      }

      .task-comment .soft-fill {
        fill: var(--icon-color);
        opacity: .10;
      }

      .task-comment .stroke {
        fill: none;
        stroke: var(--icon-color);
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .task-comment .main {
        stroke-width: 1.42;
      }

      .task-comment .detail {
        stroke-width: 1.02;
        opacity: .82;
      }

      .task-comment .fold {
        fill: var(--icon-color);
        opacity: .26;
      }
    </style>
