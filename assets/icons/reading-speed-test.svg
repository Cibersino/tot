<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="title">
  <title id="title">reading-speed-test</title>

  <rect class="reading-card-shadow" x="3.55" y="4.45" width="11.35" height="14.05" rx="1.8" fill="var(--tot-icon-reading-speed-test-shadow, #8A3842)" opacity=".32"/>
  <rect class="reading-card" x="2.8" y="3.7" width="11.35" height="14.05" rx="1.8" fill="var(--tot-icon-reading-speed-test-card, #C95A63)"/>
  <path class="reading-card-fold" d="M11.2 3.7h1.2c.96 0 1.75.79 1.75 1.75v1.2z" fill="var(--tot-icon-reading-speed-test-fold, #EFA0A6)"/>
  <path class="reading-card-lines" d="M4.95 7.85h6.35M4.95 10.45h5.65M4.95 13.05h6.55M4.95 15.65h4.9" fill="none" stroke="var(--tot-icon-reading-speed-test-lines, #F7FBFF)" stroke-width="1.2" stroke-linecap="round" opacity=".98"/>

  <rect class="stopwatch-button" x="16.55" y="8.95" width="1.8" height="1.55" rx=".45" fill="var(--tot-icon-reading-speed-test-stopwatch-case, #47586f)"/>
