  <path class="stopwatch-ticks" d="M17.45 11.95v1.05M21.35 15.85H20.3M14.6 15.85h-1.05M17.45 19.75V18.7" fill="none" stroke="var(--tot-icon-reading-speed-test-stopwatch-rim, #47586f)" stroke-width=".9" stroke-linecap="round" opacity=".9"/>
  <circle class="stopwatch-center" cx="17.45" cy="15.85" r=".65" fill="var(--tot-icon-reading-speed-test-stopwatch-center, #47586f)"/>
  <path class="stopwatch-hand-main" d="M17.45 15.85l2.25-1.95" fill="none" stroke="var(--tot-icon-reading-speed-test-stopwatch-hand, #e46e4b)" stroke-width="1.35" stroke-linecap="round"/>
  <path class="stopwatch-hand-secondary" d="M17.45 15.85v-2.35" fill="none" stroke="var(--tot-icon-reading-speed-test-stopwatch-hand-secondary, #f3b646)" stroke-width="1.05" stroke-linecap="round"/>
