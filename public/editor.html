<!-- public/editor.html -->
<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none';" />

  <title>toT — Texto completo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="editor.css" />
</head>

<body>
  <!-- The textarea takes up all the available space -->
  <div id="editorWrap" class="editor-wrap">
    <div id="editorLayout" class="editor-layout">
      <div id="editorLeftGutter" class="editor-gutter editor-gutter-left"></div>
      <div id="editorTextColumn" class="editor-text-column">
        <textarea id="editorArea" placeholder="Escribe o pega aquí..."></textarea>
      </div>
      <div id="editorRightGutter" class="editor-gutter editor-gutter-right"></div>
    </div>
  </div>

  <!-- Bottom bar: CALC/SAVE | checkboxes | TRASH (right aligned) -->
  <div id="bottomBar" class="bottom-bar" role="region" aria-label="Controles del editor">
    <div class="left-controls">
      <button id="btnCalc" class="btn-calc" disabled data-label="CALCULAR" aria-label="CALC/SAVE"></button>
      <label class="calc-label editor-toggle-label" data-label="Auto-cálculo"><input
          id="calcWhileTyping" type="checkbox" checked
          aria-label="Auto-cálculo" /></label>
      <label class="spellcheck-label editor-toggle-label" data-label="Ortografía"><input
          id="spellcheckToggle" type="checkbox" checked
          aria-label="Ortografía" /></label>
      <div
        id="editorTextSizeControls"
        class="editor-text-size-controls"
        role="group"
        aria-label="Tamaño del texto"
      >
        <span id="editorTextSizeLabel" class="editor-text-size-label" data-label="Tamaño"></span>
        <button id="btnTextSizeDecrease" class="btn-text-size" type="button" data-label="-" aria-label="Reducir tamaño del texto" title="Reducir tamaño del texto"></button>
        <output id="editorTextSizeValue" class="editor-text-size-value" data-label="20 px" aria-live="polite" aria-atomic="true" aria-label="20 px"></output>
        <button id="btnTextSizeIncrease" class="btn-text-size" type="button" data-label="+" aria-label="Aumentar tamaño del texto" title="Aumentar tamaño del texto"></button>
        <button id="btnTextSizeReset" class="btn-text-size btn-text-size-reset" type="button" data-label="↺" aria-label="Restablecer tamaño del texto" title="Restablecer tamaño del texto"></button>
      </div>
      <div
        id="editorReadProgress"
        class="editor-read-progress"
        role="status"
        aria-live="polite"
        aria-atomic="true"
        aria-label="Leído"
      >
        <span id="editorReadProgressLabel" class="editor-read-progress-label" data-label="Leído"></span>
        <output id="editorReadProgressValue" class="editor-read-progress-value" data-label="0%" aria-label="Progreso de lectura: 0%"></output>
      </div>
    </div>

    <div class="right-controls">
      <button id="btnTrash" class="btn-trash" data-label="Vaciar" aria-label="Vaciar" title="Vaciar"></button>
    </div>
  </div>

  <div
    id="readingTestPrestartOverlay"
    class="reading-test-prestart-overlay"
    aria-hidden="true"
    tabindex="-1"
  >
    <div class="reading-test-prestart-panel">
      <p id="readingTestPrestartMessage" class="reading-test-prestart-message"></p>
    </div>
  </div>

  <script src="js/log.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/document_language.js"></script>
  <script src="js/lib/editor_maximized_layout_core.js"></script>
  <script src="js/lib/editor_find_replace_core.js"></script>
  <script src="js/editor_ui.js"></script>
  <script src="js/editor_engine.js"></script>
  <script src="editor.js"></script>
</body>

</html>
