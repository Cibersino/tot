<!-- public/flotante.html -->
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none';" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="flotante.css" />
  <title>toT — Cronómetro Flotante</title>
</head>
<body>
  <div id="flotante-root" class="flotante-root">
    <div id="crono" class="crono">00:00:00</div>
    <div class="controls">
      <button id="toggle" class="btn" title="Iniciar o pausar cronómetro" aria-label="Iniciar o pausar cronómetro"
        data-tot-icon="play" data-tot-icon-size="md"></button>
      <button id="reset" class="btn" title="Detener y restablecer cronómetro"
        aria-label="Detener y restablecer cronómetro" data-tot-icon="stop" data-tot-icon-size="md"></button>
    </div>
  </div>
  <script src="js/log.js"></script>
  <script src="js/generated_icons.js"></script>
  <script src="js/renderer_icons.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/lib/stopwatch_time_core.js"></script>
  <script src="js/crono.js"></script>
  <script src="flotante.js"></script>
</body>
</html>
